<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description | escape }}">
  <title>{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="{{ '/' | relative_url }}" class="nav-logo">{{ site.title | split: '|' | first | strip }}</a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <ul class="nav-menu">
        <li><a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}"><i class="fas fa-home"></i> 首页</a></li>
        <li><a href="{{ '/about' | relative_url }}" class="{% if page.url contains '/about' %}active{% endif %}"><i class="fas fa-user"></i> 关于</a></li>
        <li><a href="{{ '/projects' | relative_url }}" class="{% if page.url contains '/projects' %}active{% endif %}"><i class="fas fa-code"></i> 项目</a></li>
        <li><a href="{{ '/blog' | relative_url }}" class="{% if page.url contains '/blog' %}active{% endif %}"><i class="fas fa-pen-fancy"></i> 博客</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-info">
          <p>&copy; {{ 'now' | date: "%Y" }} LBK (popcornGit). Built with <i class="fas fa-heart" style="color: var(--accent);"></i> and Jekyll.</p>
        </div>
        <div class="footer-links">
          <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" title="GitHub">
            <i class="fab fa-github"></i>
          </a>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
